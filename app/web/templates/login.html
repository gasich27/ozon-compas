{% extends "base.html" %}
{% block title %}Вход · Ozon Radar{% endblock %}
{% block auth_content %}
<section class="auth-card">
  <a class="auth-brand" href="{{ url_for('login') }}"><span class="brand-mark">OR</span> Ozon Radar</a>
  <p class="eyebrow">С возвращением</p>
  <h1>Войти в кабинет</h1>
  <p>Ваши товары, CSV и аналитика хранятся отдельно от других пользователей.</p>
  <form method="post" action="{{ url_for('login_submit') }}">
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    <label>Электронная почта<input type="email" name="email" required autocomplete="email"></label>
    <label>Пароль<input type="password" name="password" required autocomplete="current-password"></label>
    <button class="button wide">Войти</button>
  </form>
  <p class="auth-switch">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
</section>
{% endblock %}
